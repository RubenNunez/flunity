name: flunity_bridge
description: Flutter package for embedding Unity (WebGL or native iOS / Android) inside a Flutter app, with a typed Flutter <-> Unity message bridge.
version: 0.1.0
homepage: https://github.com/RubenNunez/flunity
repository: https://github.com/RubenNunez/flunity
issue_tracker: https://github.com/RubenNunez/flunity/issues

environment:
  flutter: ^3.38.0
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  meta: ^1.12.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlunityBridgeIosPlugin
      android:
        package: com.flunity.bridge
        pluginClass: FlunityBridgeAndroidPlugin
