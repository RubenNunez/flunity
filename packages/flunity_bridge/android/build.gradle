// Adapted from flutter_embed_unity_6000_0_android/android/build.gradle v2.0.0
// (MIT, learntoflutter). Group + namespace rebranded to com.flunity.bridge,
// minSdk bumped to 24 to align with Unity 6 + Plan F's locked baselines.
// See packages/flunity_bridge/THIRDPARTY.md for full attribution.

group = "com.flunity.bridge"
version = "0.1.0"

buildscript {
    ext.kotlin_version = '2.1.20'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.7.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.flunity.bridge"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 24
        // Proguard rules required because reflection is used when passing
        // messages between Flutter and Unity. consumerProguardFiles are
        // combined with the consuming app's proguard rules when R8 runs.
        consumerProguardFiles("lib-proguard-rules.txt")
    }

    dependencies {
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        // Unity classes stub jar — needed only at compile time. At runtime
        // the user's exported Unity Library provides the real classes.
        // Vendored from upstream's libs/unity_classes_6000.0.LTS.jar.
        compileOnly(fileTree("libs") {
            include("*.jar")
        })
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
                events "passed", "skipped", "failed", "standardOut", "standardError"
                outputs.upToDateWhen { false }
                showStandardStreams = true
            }
        }
    }
}
