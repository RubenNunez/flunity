name: flunity
repository: https://github.com/RubenNunez/flunity

packages:
  - packages/**
  - examples/**

ignore:
  - packages/*/templates/**

command:
  bootstrap:
    runPubGetInParallel: true
  version:
    branch: main
    workspaceChangelog: true

scripts:
  analyze:
    description: Analyze every package
    run: melos exec -- "dart analyze ."
  test:
    description: Run tests in every package
    run: 'melos exec --dir-exists=test -- "if grep -q ''sdk: flutter'' pubspec.yaml; then flutter test; else dart test; fi"'
  format:
    description: Format every Dart file under lib/, test/, bin/ (skips templates/).
    run: 'melos exec -- "dart format $(ls -d lib test bin 2>/dev/null | tr ''\n'' '' '')"'
  format-check:
    # Scope to lib/, test/, bin/ — skips templates/, which contains scaffolded
    # Flutter code with __placeholder__ tokens. Formatter output across patch
    # SDKs is occasionally unstable on those, and they're regenerated on
    # `flunity create` anyway.
    description: Check formatting under lib/, test/, bin/ (CI).
    run: 'melos exec -- "dart format --output=none --set-exit-if-changed $(ls -d lib test bin 2>/dev/null | tr ''\n'' '' '')"'
