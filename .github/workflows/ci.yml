name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin to the project's declared Flutter baseline (pubspecs require
          # ^3.38.0 / Dart ^3.10.0). Pinning prevents formatter drift between
          # local dev and CI when stable advances ahead of our baseline.
          flutter-version: '3.38.0'
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run format-check
      - run: melos run analyze
      - run: melos run test
