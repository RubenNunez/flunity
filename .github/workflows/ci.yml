name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin to a Flutter version that ships stable Dart 3.10. Flutter
          # 3.38.0 itself shipped with Dart 3.10.0-beta which doesn't satisfy
          # our pubspec constraint of `^3.10.0` (pre-release tags sort below
          # 3.10.0). 3.38.7 is the first patch with stable Dart 3.10.7.
          flutter-version: '3.38.7'
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run format-check
      - run: melos run analyze
      - run: melos run test
